<!doctype html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Add Location</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="translations.js"></script>
  <script defer src="user.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const isEdit = urlParams.get('edit') === 'true';

      if (isEdit) {
        // Change title and button for edit mode
        const titleEl = document.querySelector('.title');
        if (titleEl) titleEl.setAttribute('data-translate', 'edit_address');

        const buttonEl = document.querySelector('.action-btn');
        if (buttonEl) buttonEl.setAttribute('data-translate', 'save_changes');

        // Populate form with current user location
        const user = JSON.parse(sessionStorage.getItem('user') || '{}');
        if (user.location) {
          const { pin, state, city, landmark, village, building_number } = user.location;
          document.getElementById('pin').value = pin || '';
          document.getElementById('state').value = state || '';
          document.getElementById('city').value = city || '';
          document.getElementById('landmark').value = landmark || '';
          const villageBuilding = [village, building_number].filter(Boolean).join(', ');
          document.getElementById('village_building').value = villageBuilding || '';
        }
      }

      // Auto-fetch location by pin code
      const pinInput = document.getElementById('pin');
      if (pinInput) {
        pinInput.addEventListener('blur', async () => {
          const pin = pinInput.value.trim();
          if (pin.length === 6 && /^\d+$/.test(pin)) {
            try {
              // Use postalpincode.in API for Indian pin codes
              const response = await fetch(`https://api.postalpincode.in/pincode/${pin}`);
              const data = await response.json();

              if (data && data[0] && data[0].Status === 'Success' && data[0].PostOffice && data[0].PostOffice.length > 0) {
                const postOffice = data[0].PostOffice[0];
                document.getElementById('state').value = postOffice.State || '';
                document.getElementById('city').value = postOffice.District || postOffice.Division || '';
                document.getElementById('village').value = postOffice.Name || '';
              }
            } catch (error) {
              console.error('Error fetching pin code details:', error);
              // Don't show alert, just log the error
            }
          }
        });
      }

      // Handle form submission
      const form = document.getElementById('locForm');
      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();

          const pin = document.getElementById('pin').value.trim();
          const state = document.getElementById('state').value.trim();
          const city = document.getElementById('city').value.trim();
          const landmark = document.getElementById('landmark').value.trim();
          const villageBuilding = document.getElementById('village_building').value.trim();

          if (!pin || !state || !city || !villageBuilding) {
            alert('Please fill in all required fields');
            return;
          }

          // Parse village and building number from combined field
          const [village, building_number] = villageBuilding.split(',').map(s => s.trim());

          try {
            const user = JSON.parse(sessionStorage.getItem('user') || '{}');
            user.location = { pin, state, city, landmark, village: village || '', building_number: building_number || '' };
            sessionStorage.setItem('user', JSON.stringify(user));

            alert(isEdit ? 'Address updated successfully!' : 'Location added successfully!');
            window.location.href = 'home.html';
          } catch (error) {
            console.error('Error saving location:', error);
            alert('Failed to save location. Please try again.');
          }
        });
      }
    });

    // Function to detect and fill location
    async function detectAndFillLocation() {
      const detectLocationBtn = document.getElementById('detect-location-btn');
      if (!navigator.geolocation) {
        alert('Geolocation is not supported by your browser.');
        return;
      }

      if (detectLocationBtn) {
        detectLocationBtn.disabled = true;
        detectLocationBtn.textContent = translate('detecting_location');
      }

      navigator.geolocation.getCurrentPosition(async (position) => {
        const { latitude, longitude } = position.coords;

        // Use Nominatim for reverse geocoding via shared helper
        try {
          const data = await getReverseGeocode(latitude, longitude);

          if (data && data.address) {
            document.getElementById('pin').value = data.address.postcode || '';
            document.getElementById('state').value = data.address.state || '';
            document.getElementById('city').value = data.address.city || data.address.town || data.address.village || '';
            const village = data.address.village || data.address.suburb || '';
            document.getElementById('village_building').value = village;
          } else {
            alert('Could not determine address from your location.');
          }
        } catch (error) {
          console.error('Reverse geocoding failed:', error);
          alert('Failed to fetch address details. Please enter manually.');
        } finally {
          if (detectLocationBtn) {
            detectLocationBtn.disabled = false;
            detectLocationBtn.textContent = 'Detect My Location';
          }
        }
      }, (error) => {
        alert(`Error getting location: ${error.message}`);
        if (detectLocationBtn) {
          detectLocationBtn.disabled = false;
          detectLocationBtn.textContent = 'Detect My Location';
        }
      });
    }

    // Auto-fetch location on page load if not in edit mode
    if (!isEdit) {
      detectAndFillLocation();
    }

    // --- Manual detect location button ---
    const detectLocationBtn = document.getElementById('detect-location-btn');
    if (detectLocationBtn) {
      detectLocationBtn.addEventListener('click', detectAndFillLocation);
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="logo"><div class="leaf">🍃</div>Ecovera</div>

    <div class="title" data-translate="location_title">Add Location</div>
    <div class="subtitle" data-translate="location_subtitle">Help us serve you better</div>

    <form id="locForm" class="input-card" style="margin-top:18px;">
      <div class="field-label" data-translate="pin_code">Pin Code</div>
      <input id="pin" class="input" data-translate="enter_pin" placeholder="Enter pin code" />

      <div style="height:12px"></div>
      <div class="field-label" data-translate="state">State</div>
      <input id="state" class="input" data-translate="enter_state" placeholder="Enter state" />

      <div style="height:12px"></div>
      <div class="field-label" data-translate="city">City</div>
      <input id="city" class="input" data-translate="enter_city" placeholder="Enter city" />

      <div style="height:12px"></div>
      <div class="field-label" data-translate="landmark">Landmark</div>
      <input id="landmark" class="input" data-translate="enter_landmark" placeholder="Enter landmark (optional)" />

      <div style="height:12px"></div>
      <div class="field-label" data-translate="village_building_number">Village/Building Number</div>
      <input id="village_building" class="input" data-translate="enter_village_building" placeholder="Enter village/building number" />

      <div style="height:18px"></div>
      <button type="button" id="detect-location-btn" class="action-btn" style="background:var(--meta-color); margin-bottom:10px;" data-translate="detect_my_location">Detect My Location</button>
      <button class="action-btn" type="submit" data-translate="continue">Continue to Home</button>
    </form>
  </div>

  <!-- Language Selection Modal -->
  <div id="language-modal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div class="modal-content" style="background: white; padding: 20px; border-radius: 12px; max-width: 400px; width: 90%; text-align: center;">
      <h3 data-translate="language_title">Select Your Language</h3>
      <p data-translate="language_subtitle">Choose your preferred language from the options below</p>
      <div class="lang-options" style="display: flex; flex-direction: column; gap: 10px; margin: 20px 0;">
        <button class="lang-btn" data-lang="en" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9;">English</button>
        <button class="lang-btn" data-lang="kn" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9;">ಕನ್ನಡ (Kannada)</button>
        <button class="lang-btn" data-lang="hi" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9;">हिन्दी (Hindi)</button>
      </div>
      <button id="close-modal" style="padding: 10px 20px; background: var(--green); color: white; border: none; border-radius: 8px;" data-translate="close">Close</button>
    </div>
  </div>
</body>
</html>
